{% extends 'body.html' %}

{% block content %}

<h1>Teams</h1>

<div class="container-fluid">
  <div class="row">
    {% for division,teams in division_seed.items %}
    <div class="col">
      <h2>{{division.name}}</h2>

      {% include "_division_nav.html" %}

      <ol class="list-group">
        {% for team in teams %}
        <li class="list-group-item"><a href="schedule-team-{{team.id}}">{{team.name}}</a></li>
        {% endfor %}
      </ol>
    </div>
    {%endfor%}
  </div>
</div>
{% endblock %}
